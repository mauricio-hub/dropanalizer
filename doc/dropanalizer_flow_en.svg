<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-en desc-en" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0B0F14;">
  <title id="title-en">Dropanalizer — Usability flow (EN)</title>
  <desc id="desc-en">Flow diagram showing how the seller creates, publishes, measures and optimizes sales pages, plus the buyer's visit and the AI iteration loop.</desc>

  <defs>
    <marker id="arrow-en" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrow-green-en" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22C55E"/>
    </marker>
  </defs>

  <style>
    .lane-bg-en { fill: #111827; opacity: 0.35; }
    .lane-label-en { fill: #9CA3AF; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .box-en { fill: #111827; stroke: #1F2937; stroke-width: 1.5; }
    .box-accent-en { fill: #111827; stroke: #22C55E; stroke-width: 1.8; }
    .title-en { fill: #E5E7EB; font-size: 14px; font-weight: 700; }
    .subtitle-en { fill: #9CA3AF; font-size: 11.5px; }
    .badge-en { fill: #22C55E; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .edge-en { stroke: #6B7280; stroke-width: 1.5; fill: none; }
    .edge-green-en { stroke: #22C55E; stroke-width: 2; fill: none; stroke-dasharray: 5 4; }
    .edge-label-en { fill: #9CA3AF; font-size: 10.5px; font-weight: 500; }
    .header-en { fill: #E5E7EB; font-size: 18px; font-weight: 700; }
    .header-sub-en { fill: #9CA3AF; font-size: 12px; }
    .icon-circle-en { fill: #22C55E; opacity: 0.15; }
    .icon-glyph-en { fill: #22C55E; font-size: 13px; font-weight: 700; }
  </style>

  <rect x="0" y="0" width="1100" height="720" fill="#0B0F14"/>

  <text x="40" y="36" class="header-en">Dropanalizer · Usability flow</text>
  <text x="40" y="56" class="header-sub-en">Generate → Measure → Optimize automatically</text>

  <rect x="30" y="82" width="1040" height="150" rx="10" class="lane-bg-en"/>
  <rect x="30" y="246" width="1040" height="150" rx="10" class="lane-bg-en"/>
  <rect x="30" y="410" width="1040" height="150" rx="10" class="lane-bg-en"/>
  <rect x="30" y="574" width="1040" height="120" rx="10" class="lane-bg-en"/>

  <text x="46" y="103" class="lane-label-en">1 · Seller (creator)</text>
  <text x="46" y="267" class="lane-label-en">2 · System · AI + templates</text>
  <text x="46" y="431" class="lane-label-en">3 · Buyer (visitor)</text>
  <text x="46" y="595" class="lane-label-en">4 · Optimization loop</text>

  <g>
    <rect x="60" y="120" width="170" height="90" rx="10" class="box-en"/>
    <circle cx="84" cy="146" r="14" class="icon-circle-en"/>
    <text x="84" y="151" text-anchor="middle" class="icon-glyph-en">1</text>
    <text x="108" y="151" class="title-en">Sign in</text>
    <text x="78" y="176" class="subtitle-en">Clerk authentication</text>
    <text x="78" y="192" class="subtitle-en">→ upsert user record</text>
  </g>

  <g>
    <rect x="260" y="120" width="190" height="90" rx="10" class="box-en"/>
    <circle cx="284" cy="146" r="14" class="icon-circle-en"/>
    <text x="284" y="151" text-anchor="middle" class="icon-glyph-en">2</text>
    <text x="308" y="151" class="title-en">New sales page</text>
    <text x="278" y="176" class="subtitle-en">Product or service mode</text>
    <text x="278" y="192" class="subtitle-en">Brief + price + CTA</text>
  </g>

  <g>
    <rect x="480" y="120" width="190" height="90" rx="10" class="box-en"/>
    <circle cx="504" cy="146" r="14" class="icon-circle-en"/>
    <text x="504" y="151" text-anchor="middle" class="icon-glyph-en">3</text>
    <text x="528" y="151" class="title-en">Configure</text>
    <text x="498" y="176" class="subtitle-en">Template + images</text>
    <text x="498" y="192" class="subtitle-en">CTA target (WhatsApp)</text>
  </g>

  <g>
    <rect x="700" y="120" width="190" height="90" rx="10" class="box-accent-en"/>
    <circle cx="724" cy="146" r="14" class="icon-circle-en"/>
    <text x="724" y="151" text-anchor="middle" class="icon-glyph-en">4</text>
    <text x="748" y="151" class="title-en">Review &amp; publish</text>
    <text x="718" y="176" class="subtitle-en">Creates Version (v1, v2…)</text>
    <text x="718" y="192" class="subtitle-en">Unique public URL</text>
  </g>

  <g>
    <rect x="920" y="135" width="130" height="60" rx="8" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="985" y="158" text-anchor="middle" class="badge-en">FREE PLAN</text>
    <text x="985" y="178" text-anchor="middle" class="subtitle-en">Max 3 pages</text>
    <text x="985" y="192" text-anchor="middle" class="subtitle-en">per user</text>
  </g>

  <path d="M 230 165 L 260 165" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 450 165 L 480 165" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 670 165 L 700 165" class="edge-en" marker-end="url(#arrow-en)"/>

  <g>
    <rect x="60" y="284" width="200" height="90" rx="10" class="box-accent-en"/>
    <text x="78" y="308" class="title-en">AI Agent (Claude)</text>
    <text x="78" y="328" class="subtitle-en">Structures the brief</text>
    <text x="78" y="343" class="subtitle-en">Generates headline + copy</text>
    <text x="78" y="358" class="subtitle-en">Model: sonnet-4-5</text>
  </g>

  <g>
    <rect x="290" y="284" width="200" height="90" rx="10" class="box-en"/>
    <text x="308" y="308" class="title-en">Render sales page</text>
    <text x="308" y="328" class="subtitle-en">MinimalistTemplate /</text>
    <text x="308" y="343" class="subtitle-en">VibrantTemplate</text>
    <text x="308" y="358" class="subtitle-en">Dark theme · Tailwind</text>
  </g>

  <g>
    <rect x="520" y="284" width="200" height="90" rx="10" class="box-en"/>
    <text x="538" y="308" class="title-en">Persistence</text>
    <text x="538" y="328" class="subtitle-en">Prisma + PostgreSQL</text>
    <text x="538" y="343" class="subtitle-en">Page → Versions[]</text>
    <text x="538" y="358" class="subtitle-en">Images in Cloudinary</text>
  </g>

  <g>
    <rect x="750" y="284" width="200" height="90" rx="10" class="box-accent-en"/>
    <text x="768" y="308" class="title-en">Public URL</text>
    <text x="768" y="328" class="subtitle-en">/p/[id] · no auth</text>
    <text x="768" y="343" class="subtitle-en">Shareable (WhatsApp,</text>
    <text x="768" y="358" class="subtitle-en">ads, email…)</text>
  </g>

  <path d="M 260 329 L 290 329" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 490 329 L 520 329" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 720 329 L 750 329" class="edge-en" marker-end="url(#arrow-en)"/>

  <path d="M 795 210 L 795 240 L 160 240 L 160 284" class="edge-en" marker-end="url(#arrow-en)"/>
  <text x="430" y="234" class="edge-label-en">publish → triggers AI generation</text>

  <g>
    <rect x="60" y="448" width="200" height="90" rx="10" class="box-en"/>
    <text x="78" y="472" class="title-en">Buyer opens URL</text>
    <text x="78" y="492" class="subtitle-en">Visits /p/[id]</text>
    <text x="78" y="507" class="subtitle-en">No login required</text>
    <text x="78" y="522" class="subtitle-en">Mobile first</text>
  </g>

  <g>
    <rect x="290" y="448" width="200" height="90" rx="10" class="box-accent-en"/>
    <text x="308" y="472" class="title-en">Automatic tracking</text>
    <text x="308" y="492" class="subtitle-en">view · click · time_spent</text>
    <text x="308" y="507" class="subtitle-en">POST /api/track</text>
    <text x="308" y="522" class="subtitle-en">→ Event (per version)</text>
  </g>

  <g>
    <rect x="520" y="448" width="200" height="90" rx="10" class="box-en"/>
    <text x="538" y="472" class="title-en">CTA click</text>
    <text x="538" y="492" class="subtitle-en">Opens WhatsApp or</text>
    <text x="538" y="507" class="subtitle-en">configured external link</text>
    <text x="538" y="522" class="subtitle-en">→ conversion / sale</text>
  </g>

  <g>
    <rect x="750" y="448" width="200" height="90" rx="10" class="box-en"/>
    <text x="768" y="472" class="title-en">Analytics dashboard</text>
    <text x="768" y="492" class="subtitle-en">Views, clicks, time</text>
    <text x="768" y="507" class="subtitle-en">Visible to the seller</text>
    <text x="768" y="522" class="subtitle-en">/analytics</text>
  </g>

  <path d="M 260 493 L 290 493" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 490 493 L 520 493" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 720 493 L 750 493" class="edge-en" marker-end="url(#arrow-en)"/>

  <path d="M 850 374 L 850 405 L 160 405 L 160 448" class="edge-en" marker-end="url(#arrow-en)"/>
  <text x="430" y="400" class="edge-label-en">URL distributed → real traffic</text>

  <g>
    <rect x="60" y="608" width="220" height="74" rx="10" class="box-accent-en"/>
    <text x="78" y="632" class="title-en">AI recommendations</text>
    <text x="78" y="652" class="subtitle-en">Detects drop-offs, weak CTAs,</text>
    <text x="78" y="667" class="subtitle-en">low-engagement copy</text>
  </g>

  <g>
    <rect x="320" y="608" width="220" height="74" rx="10" class="box-en"/>
    <text x="338" y="632" class="title-en">Seller reviews</text>
    <text x="338" y="652" class="subtitle-en">Accepts / rejects suggestions</text>
    <text x="338" y="667" class="subtitle-en">Fast decision, no design work</text>
  </g>

  <g>
    <rect x="580" y="608" width="220" height="74" rx="10" class="box-accent-en"/>
    <text x="598" y="632" class="title-en">New version</text>
    <text x="598" y="652" class="subtitle-en">AI regenerates content</text>
    <text x="598" y="667" class="subtitle-en">Immutable versions (v+1)</text>
  </g>

  <g>
    <rect x="840" y="608" width="220" height="74" rx="10" class="box-en"/>
    <text x="858" y="632" class="title-en">Re-publish</text>
    <text x="858" y="652" class="subtitle-en">New URL + tracking</text>
    <text x="858" y="667" class="subtitle-en">back to the loop</text>
  </g>

  <path d="M 280 645 L 320 645" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 540 645 L 580 645" class="edge-en" marker-end="url(#arrow-en)"/>
  <path d="M 800 645 L 840 645" class="edge-en" marker-end="url(#arrow-en)"/>

  <path d="M 850 538 L 850 575 L 170 575 L 170 608" class="edge-green-en" marker-end="url(#arrow-green-en)"/>
  <text x="430" y="569" class="edge-label-en" fill="#22C55E">behavioral data → input for AI</text>

  <path d="M 950 608 Q 1075 500 1075 380 Q 1075 250 950 250 L 850 250 L 850 284" class="edge-green-en" marker-end="url(#arrow-green-en)"/>
  <text x="1015" y="430" class="edge-label-en" fill="#22C55E" transform="rotate(-90 1015 430)">continuous iteration</text>
</svg>
